name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
      - '!v*-*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # mint creates the GitHub release itself (with AI-generated notes) right
      # after pushing the tag that triggered this run. Wait for it so goreleaser
      # (release.mode: keep-existing) attaches binaries to mint's release instead
      # of racing it. If the release never appears (publish disabled or failed),
      # proceed anyway — keep-existing creates a plain release as the fallback.
      - name: Wait for mint's own release
        run: |
          for i in $(seq 1 24); do
            if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "release $GITHUB_REF_NAME exists"
              exit 0
            fi
            sleep 5
          done
          echo "release $GITHUB_REF_NAME not found after 2m; goreleaser will create it"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract checksums
        id: checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CHECKSUMS_FILE="dist/mint_${VERSION}_checksums.txt"
          SHA256_ARM64=$(grep "mint_${VERSION}_darwin_arm64.tar.gz" "$CHECKSUMS_FILE" | awk '{print $1}')
          SHA256_AMD64=$(grep "mint_${VERSION}_darwin_amd64.tar.gz" "$CHECKSUMS_FILE" | awk '{print $1}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256_arm64=$SHA256_ARM64" >> "$GITHUB_OUTPUT"
          echo "sha256_amd64=$SHA256_AMD64" >> "$GITHUB_OUTPUT"

      - name: Dispatch to homebrew-tools
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.CICD_PAT }}" \
            https://api.github.com/repos/leeovery/homebrew-tools/dispatches \
            -d '{
              "event_type": "update-formula",
              "client_payload": {
                "tool": "mint",
                "version": "${{ steps.checksums.outputs.version }}",
                "sha256_arm64": "${{ steps.checksums.outputs.sha256_arm64 }}",
                "sha256_amd64": "${{ steps.checksums.outputs.sha256_amd64 }}"
              }
            }'
